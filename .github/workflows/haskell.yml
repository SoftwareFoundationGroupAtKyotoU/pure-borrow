name: Haskell CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  ci-enumerate:
    name: Enumerate GHC Versions
    runs-on: ubuntu-latest
    outputs:
      plan: ${{steps.list-ci.outputs.plan}}
    steps:
      - uses: actions/checkout@v3
        with:
          ref: ${{github.event.pull_request.head.sha || github.sha}}
      - name: Enumerate CI plans
        id: list-ci
        uses: actions/github-script@v6
        with:
          script: |
            const script = require('./ci/scripts/enumerate-ci.js')
            await script({github, context, core, glob, io, require})

  build:
    name: Build (${{matrix.plan.name}})
    needs: [ci-enumerate]
    continue-on-error: true
    strategy:
      matrix:
        plan: ${{fromJSON(needs.ci-enumerate.outputs.plan)}}
      fail-fast: false
    env:
      cabal-version: 3.16.1.0
      cabal: "cabal --project-file=${{matrix.plan.path}}"
      ghc: ${{matrix.plan.ghc}}
      project-file: ${{matrix.plan.path}}
      plan: ${{matrix.plan.name}}
      artifact-name: "artifact-${{matrix.plan.name}}"
    runs-on: ubuntu-latest
    outputs:
      benchmarks: ${{steps.list-bins.outputs.benchs}}
      tests: ${{steps.list-bins.outputs.tests}}
      artifact: "artifact-${{matrix.plan.name}}"
    steps:
      - uses: actions/checkout@v3
        with:
          ref: ${{github.event.pull_request.head.sha || github.sha}}
      - name: Calculate hash keys
        uses: actions/github-script@v6
        id: cache-keys
        with:
          script: |
            const script = require('./ci/scripts/calc-cache-keys.js')
            await script({ os: "ubuntu", plan: ${{toJSON(env.plan)}}, path: ${{toJSON(env.project-file)}}, core, glob })

      - name: Setup Haskell
        uses: haskell-actions/setup@v2
        with:
          enable-stack: false
          cabal-version: ${{env.cabal-version}}
          ghc-version: ${{env.ghc}}
      - name: Restore ~/.cabal/store
        uses: actions/cache/restore@v3
        with:
          path: ~/.cabal/store
          key: ${{steps.cache-keys.outputs.store}}
          restore-keys: ${{steps.cache-keys.outputs.store-restore}}
      - name: Restore dist-newstyle
        uses: actions/cache/restore@v3
        with:
          path: dist-newstyle
          key: ${{steps.cache-keys.outputs.dist}}
          restore-keys: ${{steps.cache-keys.outputs.dist-restore}}
      - name: cabal configure
        run: |
          ${{env.cabal}} v2-configure --enable-tests --enable-benchmarks --enable-optimisation=2
          ${{env.cabal}} update
      - name: Build Dependencies
        run: |
          ${{env.cabal}} build --only-dependencies all
      - name: Save ~/.cabal/store Cache
        uses: actions/cache/save@v3
        with:
          path: ~/.cabal/store
          key: ${{steps.cache-keys.outputs.store}}
      - name: Build All
        run: |
          ${{env.cabal}} build all
      - name: Save dist-newstyle Cache
        uses: actions/cache/save@v3
        with:
          path: dist-newstyle
          key: ${{steps.cache-keys.outputs.dist}}

      - name: Collect binaries
        continue-on-error: true
        run: bash ./ci/scripts/collect-bins.sh "${{env.artifact-name}}"
      - name: Upload Aritracts
        uses: actions/upload-artifact@v4
        with:
          path: ${{env.artifact-name}}.tar.zst
          name: ${{env.artifact-name}}
          retention-days: 1
      - name: List Binaries
        id: list-bins
        shell: bash
        run: |
          echo "benchs=$(jq -cMnR '[inputs]' <"${{env.artifact-name}}"/benchs.list)" >>"${GITHUB_OUTPUT}"
          echo "tests=$(jq -cMnR '[inputs]' <"${{env.artifact-name}}"/tests.list)" >>"${GITHUB_OUTPUT}"

  test:
    name: Test (${{matrix.plan.name}})
    needs: [ci-enumerate, build]
    continue-on-error: ${{matrix.plan.is_head}}
    strategy:
      matrix:
        plan: ${{fromJSON(needs.ci-enumerate.outputs.plan)}}
      fail-fast: false
    env:
      cabal: 3.10.1.0
      ghc: ${{matrix.plan.ghc}}
      project-file: ${{matrix.plan.path}}
      plan: ${{matrix.plan.name}}
      artifact: artifact-${{matrix.plan.name}}
    runs-on: ubuntu-latest
    steps:
      - name: Fail when Corresponding Build didn't succeed
        if: ${{needs.build.result != 'success' }}
        run: echo "BUILD FAILED" >&2; exit 1
      - uses: actions/checkout@v3
        with:
          ref: ${{github.event.pull_request.head.sha || github.sha}}
      - name: Download artifacts
        id: download
        uses: actions/download-artifact@v4
        with:
          name: ${{env.artifact}}
      - name: Decompress
        run: |
          ls -R "${{ steps.download.outputs.download-path }}"
          tar xaf "${{ steps.download.outputs.download-path }}/${{env.artifact}}.tar.zst"
      - name: Run Tests
        shell: bash
        run: |
          set -euo pipefail
          TOTAL=0
          SUCCESS=0
          FAIL=0
          while read -r TEST; do
            TOTAL=$((TOTAL + 1))
            echo "--------"
            echo "Running: ${TEST}"
            set +e
            ${{env.artifact}}/tests/"${TEST}"
            RESL=$?
            set -e
            if [ ${RESL} -eq 0 ]; then
              SUCCESS=$((SUCCESS + 1))
              echo "Result: Successed"
            else
              FAIL=$((FAIL + 1))
              echo 'Result: FAILED!'
            fi
          done <${{env.artifact}}/tests.list

          echo ""
          echo "----"

          if [ "${FAIL}" -eq 0 ]; then
            echo "All ${TOTAL} tests passed."
          else
            echo "${FAIL} out of ${TOTAL} tests FAILED"'!'
            exit 1
          fi

  bench:
    name: Benchmark (${{matrix.plan.name}})
    needs: [ci-enumerate, build]
    continue-on-error: ${{matrix.plan.is_head}}
    strategy:
      matrix:
        plan:
          - ${{ fromJSON(needs.ci-enumerate.outputs.plan)[0] }}
      fail-fast: false
    env:
      cabal: 3.10.1.0
      ghc: ${{matrix.plan.ghc}}
      project-file: ${{matrix.plan.path}}
      plan: ${{matrix.plan.name}}
      artifact: artifact-${{matrix.plan.name}}
    runs-on: ubuntu-latest
    steps:
      - name: Fail when Corresponding Build didn't succeed
        if: ${{needs.build.result != 'success' }}
        run: echo "BUILD FAILED" >&2; exit 1
      - uses: actions/checkout@v3
        with:
          ref: ${{github.event.pull_request.head.sha || github.sha}}
      - name: Download artifacts
        id: download
        uses: actions/download-artifact@v4
        with:
          name: ${{env.artifact}}
      - name: Decompress
        run: |
          ls -R "${{ steps.download.outputs.download-path }}"
          tar xaf "${{ steps.download.outputs.download-path }}/${{env.artifact}}.tar.zst"
      - name: Prepare results directory
        run: mkdir -p bench-results
      - name: Run Tests
        shell: bash
        run: >
          ${{env.artifact}}/benchs/qsort-bench
          --csv bench-results/qsort.csv
          --svg bench-results/qsort.svg
          -j1
          --time-mode=wall
          +RTS -N -s
      - name: Compress results
        run: tar caf bench-results.tar.gz bench-results
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: bench-results.tar.gz

  fourmolu:
    name: Fourmolu
    runs-on: ubuntu-latest
    steps:
      # Note that you must checkout your code before running fourmolu/fourmolu-action
      - uses: actions/checkout@v2
      - uses: fourmolu/fourmolu-action@v10
        with:
          pattern: |
            **/*.hs
            !**/Setup.hs
            !**/Setup.lhs
            !dist-newstyle/**

  cabal-check:
    name: Cabal Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: haskell-actions/setup@v2
        with:
          cabal-version: 3.16.1.0
          ghc-version: latest
      - run: cabal check

  sdist:
    name: Create Source Distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          ref: ${{github.event.pull_request.head.sha || github.sha}}
      - name: Setup Haskell
        uses: haskell-actions/setup@v2
        with:
          cabal-version: 3.16.1.0
          ghc-version: latest
      - name: Create Source Distribution
        run: |
          cabal sdist -o .
          tar xzvf pure-borrow-src.tar.gz
          cp cabal.project* pure-borrow-0.1.0.0/
          tar caf pure-borrow-src.tar.gz pure-borrow-0.1.0.0
      - name: Upload Source Distribution
        uses: actions/upload-artifact@v4
        with:
          name: pure-borrow-sdist
          path: pure-borrow-src.tar.gz

  build-oci:
    name: Build OCI Image (${{matrix.arch}})
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and export OCI tar
        uses: docker/build-push-action@v6
        with:
          context: "dockerfiles/artifact"
          platforms: linux/${{ matrix.arch }}
          # OCI形式で出力。マルチプラットフォーム統合のために不可欠
          outputs: type=oci,dest=./image-${{ matrix.arch }}.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Upload intermediate tar
        uses: actions/upload-artifact@v4
        with:
          name: image-${{ matrix.arch }}
          path: ./image-${{ matrix.arch }}.tar
          retention-days: 1

  merge-oci:
    name: Build Multi-Arch OCI Image
    runs-on: ubuntu-latest
    needs: [build-oci]
    steps:
      - name: Download all tars
        uses: actions/download-artifact@v4
        with:
          path: ./tars
          pattern: image-*
          merge-multiple: true

      # OCIレイアウトを直接操作・統合できる regctl をインストール
      - name: Install regctl
        uses: regclient/actions/regctl-installer@main

      - name: Merge OCI layouts and Export
        run: |
          for f in./tars/*.tar; do
            regctl image import ocidir://pure-borrow "$f"
          done

          regctl index create ocidir://pure-borrow:latest \
            --ref $(regctl image inspect ocidir://pure-borrow --format '{{range.Manifests}}ocidir://pure-borrow@{{.Digest}} {{end}}')

          # 統合されたレイアウトを単一のtarとしてエクスポート
          regctl image export ocidir://pure-borrow:latest ./pure-borrow-container-image.tar

      - name: Upload final multi-platform image
        uses: actions/upload-artifact@v4
        with:
          name: oci-image
          path: ./pure-borrow-container-image.tar
          compression-level: 0 # すでにgzip済みのため再圧縮を無効化 [3, 4]

  build-reference:
    name: Build API Reference
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          ref: ${{github.event.pull_request.head.sha || github.sha}}
      - name: Setup Haskell
        uses: haskell-actions/setup@v2
        with:
          cabal-version: 3.16.1.0
          ghc-version: 9.10.3
      - name: Cache Cabal Store
        uses: actions/cache@v3
        with:
          key: ${{ runner.os }}-haddock-cabal-store-${{ hashFiles('**/cabal.project*', '**/*.cabal') }}
          path: |
            ~/.cabal/store
      - name: Build Documentation
        run: |
          cabal configure --disable-optimization --disable-tests --disable-benchmarks
          cabal haddock-project --output=pure-borrow-reference
          tar caf pure-borrow-reference.tar.gz pure-borrow-reference
      - name: Upload API Reference
        uses: actions/upload-artifact@v4
        with:
          name: pure-borrow-reference
          path: pure-borrow-reference.tar.gz
